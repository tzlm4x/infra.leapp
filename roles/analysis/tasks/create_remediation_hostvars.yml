---
- name: create_remediation_hostvars | Compute remediation_todo from leapp report
  ansible.builtin.set_fact:
    leapp_remediation_todo: >-
      {%- set ns = namespace(todo=[]) -%}
      {%- for entry in leapp_report_json.entries | default([]) -%}
      {%-   set entry_groups = entry.groups | default([]) -%}
      {%-   set entry_key = entry.key | default('') -%}
      {%-   set entry_title = entry.title | default('') -%}
      {%-   set is_inhibitor =
              'inhibitor' in entry_groups
              or 'error' in entry_groups
              or ((leapp_high_sev_as_inhibitors | default(false, true) | bool) and (entry.severity | default('') == 'high')) -%}
      {%-   if is_inhibitor -%}
      {%-     if entry_key in __leapp_inhibitors_key_map -%}
      {%-       set ns.todo = ns.todo + [__leapp_inhibitors_key_map[entry_key]] -%}
      {%-     elif entry_title in __leapp_inhibitors_title_map -%}
      {%-       set ns.todo = ns.todo + [__leapp_inhibitors_title_map[entry_title]] -%}
      {%-     endif -%}
      {%-   endif -%}
      {%- endfor -%}
      {{ ns.todo | unique | list }}

- name: create_remediation_hostvars | Write host_vars and playbook for remediation
  when: leapp_remediation_todo | default([]) | length > 0
  delegate_to: localhost
  # Do not run as root on the controller node
  become: false
  block:
    # This task must NOT have run_once true due to the following Ansible behavior.
    # In the case when the first node in the inventory doesn't have leapp_remediation_todo defined, it is skipped.
    # However, this node runs the run_once task even as skipped.
    # So this run_once task is never run on a not-skipped node and hence the dir is never created.
    - name: create_remediation_hostvars | Ensure host_vars directory exists
      ansible.builtin.file:
        path: "{{ leapp_workdir_controller }}/host_vars"
        state: directory
        mode: "0755"

    - name: create_remediation_hostvars | Check if host_vars file exists
      ansible.builtin.stat:
        path: "{{ leapp_workdir_controller }}/host_vars/{{ inventory_hostname }}.yml"
      register: host_vars_inventory_stat

    - name: create_remediation_hostvars | Read existing host_vars file
      ansible.builtin.slurp:
        src: "{{ leapp_workdir_controller }}/host_vars/{{ inventory_hostname }}.yml"
      register: existing_host_vars_content
      when: host_vars_inventory_stat.stat.exists

    - name: create_remediation_hostvars | Write host_vars file
      vars:
        file_exists: "{{ host_vars_inventory_stat.stat.exists | default(false) }}"
        host_vars_content_raw: "{{ (existing_host_vars_content.content | default('')) if (file_exists and existing_host_vars_content is defined) else '' }}"
        host_vars_parsed: "{{ (host_vars_content_raw | b64decode | from_yaml) if host_vars_content_raw else {} }}"
        existing_remediation_todo: "{{ host_vars_parsed.leapp_remediation_todo | default([]) }}"
        merged_remediation_todo: "{{ (existing_remediation_todo | union(leapp_remediation_todo) | unique | list) if file_exists else leapp_remediation_todo }}"
        final_host_vars: "{{ host_vars_parsed | combine({'leapp_remediation_todo': merged_remediation_todo}, recursive=False) }}"
        host_vars_content: |
          ---
          {{ final_host_vars | to_nice_yaml }}
          ...
      ansible.builtin.copy:
        content: "{{ host_vars_content }}"
        dest: "{{ leapp_workdir_controller }}/host_vars/{{ inventory_hostname }}.yml"
        mode: "0644"

    - name: create_remediation_hostvars | Create remediation playbook file
      ansible.builtin.copy:
        content: |
          ---
          - name: Remediate
            hosts: all
            become: true
            tasks:
              - name: Perform remediations on the system
                ansible.builtin.include_role:
                  name: remediate
          ...
        dest: "{{ leapp_workdir_controller }}/remediate.yml"
        mode: "0644"

...
