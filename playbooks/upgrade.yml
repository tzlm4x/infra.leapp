---
- name: Upgrade
  hosts: rhel7
  strategy: free
  become: true
  force_handlers: true
  vars:
    leapp_upgrade_type: satellite
    leapp_satellite_organization: 
    leapp_satellite_activation_key:
    leapp_satellite_activation_key_post_upgrade:
    leapp_upgrade_opts: --target 8.10
    leapp_update_grub_to_grub_2: true
    leapp_selinux_mode: permissive
  tasks:
    - name: Perform OS upgrade
      ansible.builtin.import_role:
        name: upgrade
...
